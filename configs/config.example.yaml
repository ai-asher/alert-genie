server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 60s
  shutdown_timeout: 15s

mode: "readonly"  # "readonly" or "healing"

alertmanager:
  dedup_window: 5m
  severity_filter: ["critical", "warning"]

prometheus:
  address: "http://prometheus:9090"
  query_window: 30m
  max_concurrent_queries: 5
  query_timeout: 15s
  alert_queries:
    HighMemoryUsage:
      - 'node_memory_MemAvailable_bytes{instance="{{.instance}}"}'
      - 'node_memory_MemTotal_bytes{instance="{{.instance}}"}'
      - 'process_resident_memory_bytes{instance="{{.instance}}"}'
    HighCPUUsage:
      - 'node_cpu_seconds_total{instance="{{.instance}}", mode="idle"}'
      - 'node_load1{instance="{{.instance}}"}'
    PodCrashLooping:
      - 'kube_pod_container_status_restarts_total{pod="{{.pod}}", namespace="{{.namespace}}"}'
      - 'kube_pod_status_phase{pod="{{.pod}}", namespace="{{.namespace}}"}'
      - 'container_memory_usage_bytes{pod="{{.pod}}", namespace="{{.namespace}}"}'

claude:
  base_url: "https://api.anthropic.com"
  api_key: "${CLAUDE_API_KEY}"
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  temperature: 0.1
  timeout: 60s
  max_retries: 2
  retry_backoff: 2s

lark:
  app_id: "${LARK_APP_ID}"
  app_secret: "${LARK_APP_SECRET}"
  verification_token: "${LARK_VERIFICATION_TOKEN}"
  encryption_key: "${LARK_ENCRYPT_KEY}"
  alert_chat_id: "oc_xxxxxxxxxx"
  callback_url: "https://alert-genie.example.com/api/v1/lark/callback"
  # Multi-turn @Bot conversations (in-card replies). Disabled by default.
  # When enabled, bot_open_id is REQUIRED so we can reliably detect @Bot vs @user.
  chat_enabled: false
  bot_open_id: "ou_xxxxxxxxxx"
  bot_name: "Alert-Genie"

kubernetes:
  clusters:
    - name: "prod-cluster"
      # Use in_cluster: true when running inside the cluster
      # kubeconfig_path: "/etc/alert-genie/kubeconfig-prod"
      in_cluster: true
      allowed_namespaces: ["default", "app", "infra"]
      qps: 20
      burst: 40

ssh:
  targets:
    - name: "web-server-01"
      host: "10.0.1.10"
      port: 22
      user: "deploy"
      private_key_path: "/etc/alert-genie/ssh/id_ed25519"

safety:
  extra_whitelist: []
  extra_blacklist: []
  escalation:
    low: "auto_approve_with_notify"
    medium: "single_approval"
    high: "single_approval_with_warning"
    critical: "blocked"
  max_commands_per_plan: 10
  max_plan_timeout: 10m

approval:
  ttl: 30m
  expire_check_interval: 5m

store:
  driver: "sqlite"
  sqlite_path: "./data/alert-genie.db"
  # postgres_dsn: "postgres://user:pass@localhost:5432/alertgenie?sslmode=disable"
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 1h

topology:
  config_path: "./configs/topology.example.yaml"

logging:
  level: "info"
  format: "json"
